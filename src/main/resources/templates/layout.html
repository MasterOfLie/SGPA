<!DOCTYPE html>
<html lang="pt-br">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Usar Thymeleaf para CSS dinâmico -->
    <link th:href="@{/css/{cssFile}(cssFile=${cssFile})}" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <!-- DataTables Responsive CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Estilos customizados -->
    <style>
        * {
            font-family: 'Roboto', sans-serif;
        }
    </style>

    <title th:fragment="tituloPadrao">Sistema Administrativo</title>
</head>

<body>

    <header th:fragment="menu">
        <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
            <div class="container-lg">
                <a class="navbar-brand mb-0" href="/" th:text="${aplicacao.nome}">Sistema Administrativo</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor02"
                        aria-controls="navbarColor02" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarColor02">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-primary" href="/">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-primary" href="/processos">Processos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-primary" href="/solicitantes">Solicitantes</a>
                        </li>
                        <li class="nav-item dropdown" th:if="${isAdmin}">
                            <a class="nav-link dropdown-toggle btn btn-outline-primary" data-bs-toggle="dropdown" href="#" role="button"
                               aria-haspopup="true" aria-expanded="false">Administração</a>
                            <div class="dropdown-menu">
                                <a class="dropdown-item" href="/admin/servicos">Serviço</a>
                                <a class="dropdown-item" href="/admin/departamento">Departamento</a>
                                <a class="dropdown-item" href="/admin/usuarios">Usuário</a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item" href="/admin/config">Configurações</a>
                            </div>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle btn btn-primary" data-bs-toggle="dropdown" href="#" role="button"
                               aria-haspopup="true" aria-expanded="false" th:text="${user.nome}"></a>
                            <div class="dropdown-menu">
                                <a class="dropdown-item" href="#">Perfil</a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item btn-danger" href="/logout">Sair</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
<footer id="footer" th:fragment="rodape">
</footer>

<!-- Scripts -->
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<!-- DataTables Responsive JS -->
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

<script th:src="@{/js/custom.js}"></script>

<script type="text/javascript">

</script>
</body>

</html>
