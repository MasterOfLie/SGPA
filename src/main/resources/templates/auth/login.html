<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/{cssFile}(cssFile=${cssFile})}" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>SGPA - LOGIN</title>
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-6 d-none d-md-block">
            <h2 class="text-center">Bem-vindo ao nosso sistema</h2>
            <p class="text-center">Por favor, faça login para acessar a sua conta e aproveitar todos os recursos que oferecemos. Se você não tem uma conta, registre-se para obter acesso imediato.</p>
        </div>
        <div class="col-md-4 col-sm-12">
            <div class="card p-4 shadow">
                <h3 class="text-center mb-4">Login</h3>
                <div th:if="${param.erro}" class="text-center text-danger">
                    Usuário ou senha incorretos.
                </div>
                <form th:action="@{/auth}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                    </div>
                    <p class="text-center mt-3">
                        <a href="#">Esqueceu a senha?</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
