spring.application.name=Sistema de Gestao de Processos Administrativos

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/sgpa?createDatabaseIfNotExist=true
spring.datasource.username=d
spring.datasource.password=*
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.org.springframework.security=DEBUG
blob.connect.clientet=string
blob.container.clientet=container